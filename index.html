<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg,
                    #0f172a,
                    #1e1b4b,
                    #581c87);
        }


        .heading {
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .heading h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .addtask {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #taskInput {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 400px;
            height: 45px;
            padding: 0 15px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        #addBtn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 50px;
            height: 45px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .statssection {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .activebadge {
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .completedbadge {
            padding: 10px 20px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="heading">
        <h1>MY TASKS 📋</h1>
    </div>
    <div class="addtask">
        <input id="taskInput" type="text" placeholder="Enter Task">
        <button id="addBtn">+</button>
    </div>
    <div class="statssection">
        <div class="activebadge">0 Active</div>
        <div class="completedbadge">0 Completed</div>
    </div>

    <div class="filterbtn">
        <button>All</button>
        <button>Active</button>
        <button>Completed</button>
    </div>
    <div class="tasklist">
        <ul>
            <li>
                <input type="checkbox" class="task-check">
                Learn JavaScript
                <button class="deleteBtn">Delete</button>
            </li>
            <li>
                <input type="checkbox" class="task-check">
                Go Shopping
                <button class="deleteBtn">Delete</button>
            </li>
            <li>
                <input type="checkbox" class="task-check">
                Build Project
                <button class="deleteBtn">Delete</button>
            </li>
            <li>
                <input type="checkbox" class="task-check">
                Assignment
                <button class="deleteBtn">Delete</button>
            </li>
        </ul>

    </div>
    <div class="progress">
        <p>Completed: 1/3</p>
        <p>Progress: 33%</p>
    </div>
    <div class="completedbtn">
        <button>Clear Completed</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
