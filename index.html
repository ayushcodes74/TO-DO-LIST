<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>
    
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg,
                    #0f172a,
                    #1e1b4b,
                    #581c87);
        }


        .heading {
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .heading h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .addtask {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #taskInput {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 500px;
            height: 40px;
            padding: 0 8px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        #taskInput::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        #addBtn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 50px;
            height: 40px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .filterbtn {
            width: 270px;
            height: 40px;

            display: flex;
            justify-content: space-around;
            align-items: center;

            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 16px;
        }

        .filterbtn button {
            background: transparent;
            border: none;
            color: white;

            padding: 5px 12px;
            border-radius: 8px;

            cursor: pointer;
            font-size: 14px;

            transition: all 0.3s ease;
        }

        .filterbtn button:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .dashboard-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .statssection {
            display: flex;
            gap: 12px;
        }

        .activebadge,
        .completedbadge {
            padding: 8px 16px;
            border-radius: 999px;

            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);

            color: white;
            font-size: 14px;
        }

        .tasklist ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tasklist {
            width: 600px;
            height: 150px;

            margin: 20px auto;

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 16px;

            backdrop-filter: blur(12px);

            padding: 15px;

            overflow-y: auto;
        }

        li {
            display: flex;
            justify-content: space-between;
            border-radius: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.12);
            margin-bottom: 5px;
            color: white;
        }

        .deleteBtn {
            background: #ef4444;
            color: white;
            border-radius: 8px;
            border: none;
        }

        .completedbtn {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        #clearCompletedBtn {
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #clearCompletedBtn:hover {
            background: rgb(239, 68, 68);
        }
    </style>
</head>

<body>
    <div class="heading">
        <h1>MY TASKS 📋</h1>
    </div>

    <div class="addtask">
        <input id="taskInput" type="text" placeholder="Enter Task">
        <button id="addBtn">+</button>
    </div>

    <div class="dashboard-section">

        <div class="statssection">
            <div class="activebadge">0 Active</div>
            <div class="completedbadge">0 Completed</div>
        </div>

        <div class="filterbtn">
            <button class="active-filter">All</button>
            <button>Active</button>
            <button>Completed</button>
        </div>

    </div>
    <div class="tasklist">
        <ul id="tasklistul">
            <li>
                <input type="checkbox" class="task-check">
                Learn JavaScript
                <button class="deleteBtn">Delete</button>
            </li>
            <li>
                <input type="checkbox" class="task-check">
                Go Shopping
                <button class="deleteBtn">Delete</button>
            </li>
            <li>
                <input type="checkbox" class="task-check">
                Build Project
                <button class="deleteBtn">Delete</button>
            </li>
            <li>
                <input type="checkbox" class="task-check">
                Assignment
                <button class="deleteBtn">Delete</button>
            </li>
        </ul>

    </div>

    <div class="completedbtn">
        <button id="clearCompletedBtn">Clear Completed</button>
    </div>
    <script src="script.js"></script>
</body>

</html>
