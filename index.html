<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO LIST</title>

    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg,
                    #0f172a,
                    #1e1b4b,
                    #581c87);
        }


        .heading {
            display: flex;
            align-items: center;
            justify-content: center;

        }

        .heading h1 {
            color: white;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .addtask {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #taskInput {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 500px;
            height: 40px;
            padding: 0 8px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        #taskInput::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        #addBtn {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            width: 50px;
            height: 40px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .dashboard-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        .statssection {
            display: flex;
            gap: 12px;
        }

        #activeBadge,
        #completedBadge {
            padding: 8px 16px;
            border-radius: 999px;

            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);

            color: white;
            font-size: 14px;
        }

        .tasklist ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tasklist {
            width: 600px;
            height: 150px;

            margin: 20px auto;

            background: rgba(255, 255, 255, 0.08);

            border: 1px solid rgba(255, 255, 255, 0.15);

            border-radius: 16px;

            backdrop-filter: blur(12px);

            padding: 15px;

            overflow-y: auto;
        }

        li {
            display: flex;
            justify-content: space-between;
            border-radius: 10px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.12);
            margin-bottom: 5px;
            color: white;
        }

        .deleteBtn {
            background: #ef4444;
            color: white;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="heading">
        <h1>MY TASKS 📋</h1>
    </div>

    <div class="addtask">
        <input id="taskInput" type="text" placeholder="Enter Task">
        <button id="addBtn">+</button>
    </div>

    <div class="dashboard-section">

        <div class="statssection">
            <div id="activeBadge">0 Active</div>
            <div id="completedBadge">0 Completed</div>
        </div>
    </div>
    <div class="tasklist">
        <ul id="tasklistul">
        </ul>

    </div>
    <script src="script.js"></script>
</body>

</html>
